<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Tally mark: settled-split capsule — not a letterform -->
  <rect width="32" height="32" rx="8" fill="#0A0A0F"/>
  <defs>
    <linearGradient id="g" x1="10" y1="3" x2="22" y2="29" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <!-- Gradient capsule -->
  <rect x="10" y="3.5" width="12" height="25" rx="6" fill="url(#g)"/>
  <!-- Check outline (brand canvas) cuts through the capsule -->
  <path
    d="M8.5 15.8 13.6 20.7 23.5 9.8"
    stroke="#0A0A0F"
    stroke-width="4.4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Settled check -->
  <path
    d="M8.5 15.8 13.6 20.7 23.5 9.8"
    stroke="#10B981"
    stroke-width="2.7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
